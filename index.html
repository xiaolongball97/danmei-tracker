<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>书架 · Reading List</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper:#FBFAF7; --surface:#FFFFFF; --ink:#2B2A27; --muted:#8A867D; --faint:#B6B1A8;
    --line:rgba(43,42,39,0.09); --line-strong:rgba(43,42,39,0.16);
    --accent:#8B5A6F; --accent-soft:#8B5A6F1a;
    --reading:#8B5A6F; --finished:#5E7C6B; --want:#9A7B4F; --paused:#8C8A86; --dropped:#B0ABA2;
    --shadow:0 1px 2px rgba(43,42,39,0.05), 0 8px 24px rgba(43,42,39,0.06);
    --shadow-cover:0 2px 4px rgba(43,42,39,0.08), 0 12px 28px rgba(43,42,39,0.12);
    --serif:"Noto Serif SC","Songti SC","SimSun",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:15px;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:14px;}
  .wrap{max-width:1040px;margin:0 auto;padding:56px 28px 120px;}

  .masthead{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .wordmark{display:flex;align-items:baseline;gap:12px;}
  .wordmark .cn{font-family:var(--serif);font-size:28px;font-weight:600;letter-spacing:.04em;}
  .wordmark .en{font-size:13px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}
  .stat-line{font-size:13px;color:var(--muted);}
  .stat-line b{color:var(--ink);font-weight:600;}
  .stat-line .dot{margin:0 8px;color:var(--faint);}

  .toolbar{display:flex;align-items:center;gap:10px;margin:32px 0 22px;flex-wrap:wrap;}
  .search{flex:1;min-width:180px;position:relative;}
  .search input{width:100%;padding:9px 12px 9px 32px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink);outline:none;transition:border-color .15s;}
  .search input:focus{border-color:var(--accent);}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint);}
  .sort{padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink);outline:none;}
  .sort:focus{border-color:var(--accent);}
  .btn-add{padding:9px 16px;border:none;border-radius:8px;background:var(--ink);color:#fff;font-size:14px;font-weight:500;transition:opacity .15s,transform .05s;}
  .btn-add:hover{opacity:.88;}
  .btn-add:active{transform:translateY(1px);}

  .filters{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;}
  .chip{padding:5px 12px;border:1px solid var(--line);border-radius:999px;background:transparent;color:var(--muted);font-size:13px;transition:all .15s;}
  .chip:hover{border-color:var(--line-strong);color:var(--ink);}
  .chip.active{background:var(--ink);border-color:var(--ink);color:#fff;}
  .chip .n{opacity:.6;margin-left:5px;font-variant-numeric:tabular-nums;}

  /* ---- gallery cards ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px;}
  .tile{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow);cursor:pointer;transition:transform .14s ease, box-shadow .18s ease;}
  .tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-cover);}
  .tile-cover{position:relative;aspect-ratio:4/3;overflow:hidden;background:linear-gradient(155deg,#ffffff 0%,#f3edef 100%);}
  .tile-cover img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
  .cover-ph{width:100%;height:100%;display:grid;place-items:center;padding:20px;text-align:center;background:linear-gradient(155deg,#ffffff 0%,#f3edef 100%);}
  .cover-ph span{font-family:var(--serif);font-size:19px;font-weight:600;color:var(--ink);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .tile-pill{position:absolute;top:10px;left:10px;font-size:11px;padding:3px 9px;border-radius:999px;font-weight:600;color:#fff;backdrop-filter:blur(2px);box-shadow:0 1px 3px rgba(0,0,0,.15);}
  .tile-pill.reading{background:var(--reading);} .tile-pill.finished{background:var(--finished);}
  .tile-pill.want{background:var(--want);} .tile-pill.paused{background:var(--paused);} .tile-pill.dropped{background:var(--dropped);}
  .tile-quick{position:absolute;bottom:10px;right:10px;opacity:0;border:none;background:rgba(43,42,39,.82);color:#fff;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;transition:opacity .14s;backdrop-filter:blur(2px);}
  .tile:hover .tile-quick{opacity:1;}
  .tile-quick:hover{background:var(--accent);}
  .tile-body{padding:15px 17px 17px;flex:1;display:flex;flex-direction:column;}
  .tile-title{font-family:var(--serif);font-weight:600;font-size:17px;line-height:1.32;color:var(--ink);}
  .tile-sub{font-size:13px;color:var(--muted);margin-top:3px;}
  .tile-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:11px;}
  .tile-tag{font-size:11px;padding:2px 8px;border-radius:5px;background:var(--accent-soft);color:var(--accent);}
  .tile-foot{margin-top:auto;padding-top:14px;}
  .tile-bar{height:4px;background:var(--line);border-radius:4px;overflow:hidden;}
  .tile-bar > span{display:block;height:100%;background:var(--accent);border-radius:4px;}
  .tile-ch{font-size:12px;color:var(--faint);margin-top:7px;font-variant-numeric:tabular-nums;}

  .empty{text-align:center;padding:80px 20px;color:var(--muted);}
  .empty .mk{font-family:var(--serif);font-size:40px;color:var(--faint);margin-bottom:14px;}
  .empty p{margin:0 0 18px;}

  /* ---- overlays ---- */
  .overlay{position:fixed;inset:0;background:rgba(43,42,39,0.40);display:none;align-items:flex-start;justify-content:center;padding:56px 20px;z-index:50;overflow-y:auto;}
  .overlay.open{display:flex;}
  .modal{width:100%;max-width:520px;background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:28px;animation:rise .2s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .modal h2{font-family:var(--serif);font-size:20px;margin:0 0 20px;font-weight:600;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;letter-spacing:.02em;}
  .field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--paper);color:var(--ink);outline:none;transition:border-color .15s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:var(--surface);}
  .field textarea{resize:vertical;min-height:60px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .cover-row{display:flex;gap:8px;}
  .cover-row input{flex:1;}
  .cover-preview{margin-top:10px;}
  .cover-preview img{width:120px;aspect-ratio:4/3;object-fit:cover;border-radius:8px;border:1px solid var(--line);box-shadow:var(--shadow);}
  .modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:22px;}
  .modal-actions .right{display:flex;gap:8px;}
  .btn-ghost{padding:9px 14px;border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--ink);white-space:nowrap;}
  .btn-ghost:hover{border-color:var(--line-strong);}
  .btn-ghost:disabled{opacity:.5;cursor:default;}
  .btn-primary{padding:9px 18px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-weight:500;}
  .btn-primary:hover{opacity:.9;}
  .btn-danger{padding:9px 12px;border:none;border-radius:8px;background:transparent;color:#B5544C;font-size:13px;}
  .btn-danger:hover{background:#B5544C12;}

  /* ---- detail view ---- */
  .detail{max-width:580px;}
  .detail-top{display:flex;gap:22px;}
  .detail-cover{width:170px;flex:none;aspect-ratio:3/4;border-radius:10px;overflow:hidden;box-shadow:var(--shadow-cover);background:linear-gradient(155deg,#fff,#f3edef);}
  .detail-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .detail-info{min-width:0;flex:1;}
  .detail-info h2{font-family:var(--serif);font-size:23px;margin:2px 0 4px;font-weight:600;line-height:1.25;}
  .detail-author{color:var(--muted);font-size:14px;margin-bottom:12px;}
  .pill{display:inline-block;font-size:11px;padding:3px 10px;border-radius:999px;font-weight:600;color:#fff;}
  .pill.reading{background:var(--reading);} .pill.finished{background:var(--finished);}
  .pill.want{background:var(--want);} .pill.paused{background:var(--paused);} .pill.dropped{background:var(--dropped);}
  .d-stars{color:var(--accent);letter-spacing:2px;font-size:14px;margin-left:8px;}
  .d-prog{display:flex;align-items:center;gap:10px;margin-top:16px;}
  .d-prog-text{font-size:13px;color:var(--ink);font-variant-numeric:tabular-nums;}
  .d-prog-text b{font-weight:600;}
  .qbtn{width:30px;height:30px;border:1px solid var(--line);border-radius:7px;background:var(--surface);color:var(--muted);font-size:17px;line-height:1;display:grid;place-items:center;transition:all .12s;}
  .qbtn:hover{border-color:var(--accent);color:var(--accent);}
  .qbtn:active{transform:translateY(1px);}
  .bar{height:4px;background:var(--line);border-radius:4px;overflow:hidden;margin-top:12px;}
  .bar > span{display:block;height:100%;background:var(--accent);border-radius:4px;transition:width .25s ease;}
  .d-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px;}
  .d-tag{font-size:12px;padding:2px 9px;border-radius:6px;background:var(--accent-soft);color:var(--accent);}
  .d-link{display:inline-block;margin-top:16px;font-size:13px;color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent-soft);}
  .d-link:hover{border-bottom-color:var(--accent);}
  .d-notes{margin-top:18px;padding-top:16px;border-top:1px solid var(--line);font-size:14px;color:var(--ink);white-space:pre-wrap;line-height:1.6;}
  .detail-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:24px;}

  /* ---- backup + auth ---- */
  .backup{margin-top:44px;display:flex;gap:8px;justify-content:center;align-items:center;font-size:13px;flex-wrap:wrap;}
  .backup button{border:none;background:transparent;color:var(--muted);padding:6px 10px;border-radius:6px;}
  .backup button:hover{color:var(--ink);background:var(--line);}
  .backup .sep{color:var(--faint);}
  .mode-tag{font-size:11px;color:var(--faint);border:1px solid var(--line);padding:2px 8px;border-radius:999px;}
  .gate{position:fixed;inset:0;background:var(--paper);display:none;align-items:center;justify-content:center;padding:24px;z-index:60;}
  .gate.open{display:flex;}
  .gate-card{width:100%;max-width:360px;text-align:center;}
  .gate-card .cn{font-family:var(--serif);font-size:34px;font-weight:600;letter-spacing:.05em;}
  .gate-card .en{font-size:12px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:28px;}
  .gate-card input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:var(--surface);margin-bottom:10px;outline:none;}
  .gate-card input:focus{border-color:var(--accent);}
  .gate-card .btn-primary{width:100%;margin-top:6px;padding:11px;}
  .gate-msg{font-size:13px;color:#B5544C;min-height:18px;margin-top:12px;}

  @media (max-width:560px){
    .wrap{padding:40px 18px 100px;}
    .grid{grid-template-columns:1fr;}
    .detail-top{flex-direction:column;align-items:center;text-align:center;}
    .d-prog,.d-tags,.detail-actions{justify-content:center;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>

<div class="wrap">

<script>
const STATUSES = {reading:{label:"在读"},finished:{label:"读完"},want:{label:"想读"},paused:{label:"暂停"},dropped:{label:"弃文"}};
const LOCAL_KEY = "danmei.library.v1";
const CLOUD = typeof CONFIG.SUPABASE_URL === "string" && CONFIG.SUPABASE_URL.startsWith("http");

let sb=null, library=[], activeFilter="all", editingId=null;

function uid(){
  if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c==='x'?r:(r&0x3|0x8)).toString(16);});
}
function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
function pct(n){ if(!n.total||n.total<=0) return null; return Math.min(100,Math.round((n.current/n.total)*100)); }
function tval(x){ const t=Date.parse(x.updated); return isNaN(t)?(Number(x.updated)||0):t; }

/* ---------- data layer ---------- */
function toRow(n){
  return {
    id:n.id, title:n.title, author:n.author||null, status:n.status, cover:n.cover||null,
    current:Number(n.current)||0,
    total:(n.total===null||n.total===undefined||n.total==="")?null:Number(n.total),
    rating:Number(n.rating)||0, url:n.url||null, tags:n.tags||[], notes:n.notes||null,
    updated:n.updated || new Date().toISOString()
  };
}
function saveLocal(){ try{ localStorage.setItem(LOCAL_KEY, JSON.stringify(library)); }catch(e){} }
function loadLocal(){ try{ const r=localStorage.getItem(LOCAL_KEY); return r?JSON.parse(r):[]; }catch(e){ return []; } }
async function dataLoad(){
  if(CLOUD){
    const {data,error}=await sb.from('novels').select('*');
    if(error){ alert("Couldn't load your shelf: "+error.message); return; }
    library=data||[];
  }else{ library=loadLocal(); }
}
async function persistNovel(n){
  if(CLOUD){ const {error}=await sb.from('novels').upsert(toRow(n)); if(error) alert("Save didn't go through: "+error.message); }
  else{ saveLocal(); }
}
async function removeNovel(id){
  if(CLOUD){ const {error}=await sb.from('novels').delete().eq('id',id); if(error) alert("Delete didn't go through: "+error.message); }
  else{ saveLocal(); }
}
async function uploadCover(file){
  if(CLOUD){
    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path=`${uid()}.${ext}`;
    const {error}=await sb.storage.from('covers').upload(path,file,{cacheControl:'3600',upsert:false});
    if(error){ alert("Upload failed: "+error.message+"\n(Did you run the optional storage step in the covers SQL?)"); return null; }
    return sb.storage.from('covers').getPublicUrl(path).data.publicUrl;
  }else{
    return await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
  }
}

/* ---------- covers (safe fallback, no inline-string mess) ---------- */
function coverMarkup(n){
  if(n.cover) return `<img class="cover-img" src="${escapeAttr(n.cover)}" data-ph="${escapeAttr(n.title)}" alt="" loading="lazy" />`;
  return `<div class="cover-ph"><span>${escapeHtml(n.title)}</span></div>`;
}
function wireCovers(scope){
  scope.querySelectorAll('img.cover-img').forEach(img=>{
    img.addEventListener('error',function(){
      const ph=document.createElement('div'); ph.className='cover-ph';
      const sp=document.createElement('span'); sp.textContent=this.dataset.ph||'';
      ph.appendChild(sp); this.replaceWith(ph);
    });
  });
}

/* ---------- render ---------- */
function render(){ renderStats(); renderFilters(); renderGrid(); }
function renderStats(){
  const total=library.length, reading=library.filter(n=>n.status==="reading").length;
  const chapters=library.reduce((s,n)=>s+(Number(n.current)||0),0);
  const el=document.getElementById("statLine");
  el.innerHTML = total===0 ? "" :
    `<b>${total}</b> ${total===1?"novel":"novels"}<span class="dot">·</span><b>${reading}</b> reading<span class="dot">·</span><b>${chapters.toLocaleString()}</b> chapters logged`;
}
function renderFilters(){
  const counts={all:library.length};
  for(const k in STATUSES) counts[k]=library.filter(n=>n.status===k).length;
  const order=["all","reading","finished","want","paused","dropped"];
  const labels={all:"All",reading:"在读",finished:"读完",want:"想读",paused:"暂停",dropped:"弃文"};
  const box=document.getElementById("filters");
  box.innerHTML=order.map(k=>`<button class="chip ${activeFilter===k?"active":""}" data-filter="${k}">${labels[k]}<span class="n">${counts[k]||0}</span></button>`).join("");
  box.querySelectorAll(".chip").forEach(c=>{ c.onclick=()=>{activeFilter=c.dataset.filter;renderGrid();renderFilters();}; });
}
function currentView(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  const sort=document.getElementById("sort").value;
  let items=library.slice();
  if(activeFilter!=="all") items=items.filter(n=>n.status===activeFilter);
  if(q) items=items.filter(n=>[n.title,n.author,(n.tags||[]).join(" ")].join(" ").toLowerCase().includes(q));
  items.sort((a,b)=>{
    if(sort==="title") return (a.title||"").localeCompare(b.title||"","zh");
    if(sort==="rating") return (b.rating||0)-(a.rating||0);
    if(sort==="progress") return (pct(b)??-1)-(pct(a)??-1);
    return tval(b)-tval(a);
  });
  return items;
}
function renderGrid(){
  const list=document.getElementById("list");
  const items=currentView();
  if(library.length===0){
    list.className=""; list.innerHTML=`<div class="empty"><div class="mk">书</div><p>Your shelf is empty. Add the first novel you're reading.</p><button class="btn-add" onclick="openModal()">+ Add novel</button></div>`;
    return;
  }
  if(items.length===0){ list.className=""; list.innerHTML=`<div class="empty"><p>No novels match that.</p></div>`; return; }
  list.className="grid";
  list.innerHTML=items.map(n=>{
    const p=pct(n), st=STATUSES[n.status]||{label:n.status};
    const bar=(n.total&&n.total>0)?`<div class="tile-bar"><span style="width:${p}%"></span></div>`:"";
    const ch=(n.total&&n.total>0)?`第 ${n.current||0} / ${n.total} 章 · ${p}%`:`第 ${n.current||0} 章 · 连载中`;
    const tags=(n.tags&&n.tags.length)?`<div class="tile-tags">${n.tags.slice(0,4).map(t=>`<span class="tile-tag">${escapeHtml(t)}</span>`).join("")}</div>`:"";
    return `<div class="tile" data-id="${n.id}">
      <div class="tile-cover">
        ${coverMarkup(n)}
        <span class="tile-pill ${n.status}">${st.label}</span>
        <button class="tile-quick" data-act="inc" title="+1 chapter">+1 章</button>
      </div>
      <div class="tile-body">
        <div class="tile-title">${escapeHtml(n.title)}</div>
        ${n.author?`<div class="tile-sub">${escapeHtml(n.author)}</div>`:""}
        ${tags}
        <div class="tile-foot">${bar}<div class="tile-ch">${ch}</div></div>
      </div>
    </div>`;
  }).join("");
  wireCovers(list);
  list.querySelectorAll(".tile").forEach(t=>{
    const id=t.dataset.id;
    t.onclick=()=>openDetail(id);
    t.querySelector('[data-act="inc"]').onclick=(e)=>{ e.stopPropagation(); bump(id,+1); };
  });
}

/* ---------- detail view ---------- */
function openDetail(id){
  const n=library.find(x=>x.id===id); if(!n) return;
  const st=STATUSES[n.status]||{label:n.status};
  const p=pct(n);
  const stars=n.rating?`<span class="d-stars">${"★".repeat(n.rating)}</span>`:"";
  const progText=(n.total&&n.total>0)?`第 <b>${n.current||0}</b> / ${n.total} 章 · ${p}%`:`第 <b>${n.current||0}</b> 章 · 连载中`;
  const bar=(n.total&&n.total>0)?`<div class="bar"><span style="width:${p}%"></span></div>`:"";
  const tags=(n.tags&&n.tags.length)?`<div class="d-tags">${n.tags.map(t=>`<span class="d-tag">${escapeHtml(t)}</span>`).join("")}</div>`:"";
  const link=n.url?`<a class="d-link" href="${escapeAttr(n.url)}" target="_blank" rel="noopener">打开链接 · Open to read ↗</a>`:"";
  const notes=n.notes?`<div class="d-notes">${escapeHtml(n.notes)}</div>`:"";
  const card=document.getElementById("detailCard");
  card.innerHTML=`
    <div class="detail-top">
      <div class="detail-cover">${coverMarkup(n)}</div>
      <div class="detail-info">
        <span class="pill ${n.status}">${st.label}</span>${stars}
        <h2>${escapeHtml(n.title)}</h2>
        ${n.author?`<div class="detail-author">${escapeHtml(n.author)}</div>`:""}
        <div class="d-prog">
          <button class="qbtn" data-d="dec">–</button>
          <div class="d-prog-text">${progText}</div>
          <button class="qbtn" data-d="inc">+</button>
        </div>
        ${bar}
        ${tags}
        ${link}
      </div>
    </div>
    ${notes}
    <div class="detail-actions">
      <button class="btn-ghost" id="detailClose">Close</button>
      <button class="btn-primary" id="detailEdit">Edit</button>
    </div>`;
  wireCovers(card);
  card.querySelector('[data-d="inc"]').onclick=async()=>{ await bump(id,+1); openDetail(id); };
  card.querySelector('[data-d="dec"]').onclick=async()=>{ await bump(id,-1); openDetail(id); };
  card.querySelector('#detailClose').onclick=closeDetail;
  card.querySelector('#detailEdit').onclick=()=>{ closeDetail(); openModal(id); };
  document.getElementById("detailOverlay").classList.add("open");
}
function closeDetail(){ document.getElementById("detailOverlay").classList.remove("open"); }

async function bump(id,delta){
  const n=library.find(x=>x.id===id); if(!n) return;
  n.current=Math.max(0,(Number(n.current)||0)+delta);
  n.updated=new Date().toISOString();
  renderGrid(); renderStats();
  await persistNovel(n);
}

/* ---------- edit modal ---------- */
function setPreview(url){
  document.getElementById("coverPreview").innerHTML = url ? `<img src="${escapeAttr(url)}" alt="" onerror="this.style.display='none'" />` : "";
}
function openModal(id){
  editingId=id||null;
  const n=id?library.find(x=>x.id===id):null;
  document.getElementById("modalTitle").textContent=n?"Edit novel":"Add novel";
  document.getElementById("f-title").value=n?.title||"";
  document.getElementById("f-cover").value=n?.cover||"";
  document.getElementById("f-author").value=n?.author||"";
  document.getElementById("f-status").value=n?.status||"reading";
  document.getElementById("f-current").value=n?.current??"";
  document.getElementById("f-total").value=(n&&n.total!=null)?n.total:"";
  document.getElementById("f-rating").value=n?.rating||0;
  document.getElementById("f-url").value=n?.url||"";
  document.getElementById("f-tags").value=(n?.tags||[]).join(", ");
  document.getElementById("f-notes").value=n?.notes||"";
  setPreview(n?.cover||"");
  document.getElementById("deleteBtn").style.visibility=n?"visible":"hidden";
  document.getElementById("overlay").classList.add("open");
  setTimeout(()=>document.getElementById("f-title").focus(),50);
}
function closeModal(){ document.getElementById("overlay").classList.remove("open"); editingId=null; }
async function saveModal(){
  const title=document.getElementById("f-title").value.trim();
  if(!title){ document.getElementById("f-title").focus(); return; }
  const tags=document.getElementById("f-tags").value.split(",").map(t=>t.trim()).filter(Boolean);
  const totalRaw=document.getElementById("f-total").value;
  const data={
    title, cover:document.getElementById("f-cover").value.trim(),
    author:document.getElementById("f-author").value.trim(),
    status:document.getElementById("f-status").value,
    current:Number(document.getElementById("f-current").value)||0,
    total:totalRaw===""?null:Number(totalRaw),
    rating:Number(document.getElementById("f-rating").value)||0,
    url:document.getElementById("f-url").value.trim(),
    tags, notes:document.getElementById("f-notes").value.trim(),
    updated:new Date().toISOString()
  };
  let target;
  if(editingId){ target=library.find(x=>x.id===editingId); Object.assign(target,data); }
  else{ target={id:uid(),...data}; library.push(target); }
  render(); closeModal();
  await persistNovel(target);
}
async function deleteCurrent(){
  if(!editingId) return;
  if(!confirm("Remove this novel from your shelf?")) return;
  const id=editingId; library=library.filter(x=>x.id!==id);
  render(); closeModal();
  await removeNovel(id);
}

/* ---------- backup ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(library,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=`danmei-library-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
}
function importData(file){
  const reader=new FileReader();
  reader.onload=async()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!Array.isArray(data)) throw new Error("bad");
      if(library.length && !confirm("Merge the imported novels into your shelf?")) return;
      for(const raw of data){ const n={id:raw.id||uid(),...raw}; if(!library.find(x=>x.id===n.id)) library.push(n); await persistNovel(n); }
      render();
    }catch(e){ alert("That file couldn't be read as a backup."); }
  };
  reader.readAsText(file);
}

/* ---------- auth ---------- */
function showGate(){ document.getElementById("gate").classList.add("open"); setTimeout(()=>document.getElementById("g-email").focus(),50); }
function hideGate(){ document.getElementById("gate").classList.remove("open"); }
async function doLogin(){
  const email=document.getElementById("g-email").value.trim(), password=document.getElementById("g-pass").value;
  const msg=document.getElementById("gateMsg"); msg.textContent="";
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){ msg.textContent=error.message; return; }
  hideGate(); await afterAuth();
}
async function signOut(){ await sb.auth.signOut(); library=[]; render(); showGate(); }
async function afterAuth(){ await dataLoad(); render(); }

/* ---------- wire up ---------- */
document.getElementById("addBtn").onclick=()=>openModal();
document.getElementById("saveBtn").onclick=saveModal;
document.getElementById("cancelBtn").onclick=closeModal;
document.getElementById("deleteBtn").onclick=deleteCurrent;
document.getElementById("overlay").onclick=e=>{ if(e.target.id==="overlay") closeModal(); };
document.getElementById("detailOverlay").onclick=e=>{ if(e.target.id==="detailOverlay") closeDetail(); };
document.getElementById("search").oninput=renderGrid;
document.getElementById("sort").onchange=renderGrid;
document.getElementById("exportBtn").onclick=exportData;
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=e=>{ if(e.target.files[0]) importData(e.target.files[0]); e.target.value=""; };
document.getElementById("f-cover").addEventListener("input",e=>setPreview(e.target.value.trim()));
document.getElementById("uploadBtn").onclick=()=>document.getElementById("coverFile").click();
document.getElementById("coverFile").onchange=async e=>{
  const file=e.target.files[0]; if(!file) return;
  const btn=document.getElementById("uploadBtn"); const old=btn.textContent; btn.textContent="Uploading…"; btn.disabled=true;
  const url=await uploadCover(file);
  btn.textContent=old; btn.disabled=false; e.target.value="";
  if(url){ document.getElementById("f-cover").value=url; setPreview(url); }
};
document.getElementById("loginBtn").onclick=doLogin;
document.getElementById("g-pass").addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });
document.getElementById("signoutBtn").onclick=signOut;
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ closeModal(); closeDetail(); }
  if((e.metaKey||e.ctrlKey)&&e.key==="Enter"&&document.getElementById("overlay").classList.contains("open")) saveModal();
});

/* ---------- boot ---------- */
(async function init(){
  document.getElementById("modeTag").textContent = CLOUD ? "☁ Synced" : "On this device";
  if(CLOUD){
    document.getElementById("signoutBtn").style.display="";
    document.getElementById("signoutSep").style.display="";
    sb=supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    const {data:{session}}=await sb.auth.getSession();
    if(session){ await afterAuth(); } else { showGate(); }
  }else{ await dataLoad(); render(); }
})();
</script>
